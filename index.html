<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#111;color:#fff;}

/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.7);
  padding:15px;
  text-align:center;
  z-index:1000;
}
nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
}

/* HEADER */
header{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1') center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
header h1{font-size:50px;}
header p{margin:10px 0;}
.btn{
  background:gold;
  color:black;
  padding:12px 25px;
  text-decoration:none;
  margin-top:15px;
  border-radius:5px;
}

/* SECTIONS */
section{padding:60px 20px;text-align:center;}

.cards{display:flex;flex-wrap:wrap;justify-content:center;}
.card{
  background:#222;
  margin:10px;
  padding:20px;
  width:250px;
  border-radius:10px;
  transition:0.3s;
}
.card:hover{transform:scale(1.05);}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
}

/* FOOTER */
footer{
  background:#000;
  padding:20px;
}
</style>
</head>

<body>

<nav>
  <a href="#">Ana Sayfa</a>
  <a href="#">Hizmetler</a>
  <a href="#">İletişim</a>
</nav>

<header>
  <h1></h1>
  <p></p>
  <a href="#" class="btn">Randevu Al</a>
</header>

<section>
  <h2>Hizmetler</h2>
  <div class="cards">
    <div class="card">Saç Kesimi</div>
    <div class="card">Sakal Tıraşı</div>
    <div class="card">Cilt Bakımı</div>
  </div>
</section>

<section>
  <h2>Hakkımızda</h2>
  <p>10+ yıl deneyim, profesyonel ekip.</p>
</section>

<section>
  <h2>İletişim</h2>
  <p>Telefon: 0555 555 55 55</p>
  <p>Adres: İstanbul</p>
</section>

<footer>
  <p>© 2026 Elite Barber</p>
</footer>

<a class="whatsapp" href="#">💬</a>

</body>
</html>
